<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="tela1">

    <button id="toggleTema">🌙</button>

    <button><a href="dashboard.html" target="_blank">Dashboard</a></button>

    <button id="btnLogout">Sair</button>

    <h1 class="titulo">📦 Controle de Estoque</h1>

    <form class="form">
      <input type="text" id="inputProduto" placeholder="Produto">
      <input type="number" id="quantidade" placeholder="Quantidade">
      <button type="button" id="cadastrar">Cadastrar</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>Produto</th>
          <th>Quantidade</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>

  </section>

  <script src="script.js"></script>
</body>
</html>
