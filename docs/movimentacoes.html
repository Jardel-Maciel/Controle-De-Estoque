<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movimentações — Estoque Fácil</title>
  <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="css/design-system.css"/>
  <link rel="stylesheet" href="css/toast.css"/>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="15" height="8" rx="2" fill="#1677FF"/>
        <rect x="2" y="14" width="15" height="8" rx="2" fill="#1677FF" opacity="0.7"/>
        <rect x="10" y="14" width="15" height="8" rx="2" fill="#00C48C"/>
        <rect x="2" y="26" width="22" height="8" rx="2" fill="#00C48C"/>
      </svg>
      <div class="logo-text">
        <div class="logo-name">
          <span class="white">Estoque</span> <span class="green">Fácil</span>
        </div>
        <div class="logo-tag">SaaS</div>
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Menu</div>
      <a href="dashboard.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Dashboard
      </a>
      <a href="produtos.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        Produtos
      </a>
      <a href="movimentacoes.html" class="nav-link active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        Movimentações
      </a>
      <a href="historico.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Histórico
      </a>
    </div>

    <div class="sidebar-footer">
      <button class="nav-link" id="btnLogout" style="width:100%;border:none;background:none;cursor:pointer;text-align:left;font-family:inherit;font-size:13.5px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <span class="page-title">Movimentações</span>
        <span class="breadcrumb">/ Entradas e saídas</span>
      </div>
      <div class="topbar-right">
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" type="text" id="pesquisaProduto" placeholder="Pesquisar..."/>
        </div>
        <div class="user-avatar" id="avatarUser">?</div>
      </div>
    </header>

    <div class="content">

      <div class="toolbar" style="margin-bottom:20px">
        <button class="btn btn-primary btn-sm filtro-btn active" data-filtro="todos">Todos</button>
        <button class="btn btn-secondary btn-sm filtro-btn" data-filtro="entrada">
          <span style="color:var(--success)">●</span> Entradas
        </button>
        <button class="btn btn-secondary btn-sm filtro-btn" data-filtro="saida">
          <span style="color:var(--danger)">●</span> Saídas
        </button>
      </div>

      <div id="lista" style="display:grid; gap:10px;">
        <div class="empty-state">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          <p>Carregando movimentações...</p>
        </div>
      </div>

      <div id="erro" style="color:var(--danger); padding:10px 0; font-size:13px;"></div>

    </div>
  </div>
</div>

<script src="js/toast.js"></script>
<script src="js/admin-btn.js"></script>
<script>
  const API = "https://backend-estoque-fnfc.onrender.com";
  const token = localStorage.getItem("token");
  const nome = localStorage.getItem('nome') || '?';
  document.getElementById('avatarUser').textContent = nome.charAt(0).toUpperCase();

  document.getElementById('btnLogout').addEventListener('click', function(){
    localStorage.clear(); location.href = 'index.html';
  });

  if (!token) {
    document.getElementById("erro").innerText = "Usuário não autenticado. Faça login novamente.";
  }

  let todasMovimentacoes = [];
  let filtroAtivo = 'todos';

  function renderMovimentacoes(lista) {
    const el = document.getElementById("lista");
    if (!lista || lista.length === 0) {
      el.innerHTML = `<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/></svg><p>Nenhuma movimentação encontrada</p></div>`;
      return;
    }

    el.innerHTML = lista.map(m => {
      const dataF = m.data ? new Date(m.data).toLocaleString("pt-BR") : "—";
      const isEntrada = m.tipo === 'entrada';
      return `
        <div class="card" style="display:flex; align-items:center; gap:16px; padding:16px 20px; transition:border-color 0.2s;" onmouseover="this.style.borderColor='var(--border-hover)'" onmouseout="this.style.borderColor=''">
          <div style="width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:18px; font-weight:700;
            background:${isEntrada ? 'var(--success-dim)' : 'var(--danger-dim)'};
            color:${isEntrada ? 'var(--success)' : 'var(--danger)'};">
            ${isEntrada ? '↓' : '↑'}
          </div>
          <div style="flex:1; min-width:0;">
            <div style="font-weight:600; color:var(--text-primary); text-transform:capitalize; margin-bottom:2px;">${m.produto}</div>
            <div style="font-size:12px; color:var(--text-muted);">${m.comentario || 'Sem observação'} · ${m.responsavel || 'Sem responsável'}</div>
          </div>
          <span class="badge ${isEntrada ? 'badge-success' : 'badge-danger'}">${isEntrada ? 'Entrada' : 'Saída'}</span>
          <div style="text-align:right; flex-shrink:0;">
            <div style="font-size:16px; font-weight:700; font-family:var(--font-mono); color:${isEntrada ? 'var(--success)' : 'var(--danger)'}">
              ${isEntrada ? '+' : '-'}${m.quantidade}
            </div>
            <div style="font-size:11px; color:var(--text-muted)">${dataF}</div>
          </div>
        </div>`;
    }).join('');
  }

  function aplicarFiltros() {
    const termo = document.getElementById('pesquisaProduto').value.toLowerCase();
    let filtradas = todasMovimentacoes;
    if (filtroAtivo !== 'todos') filtradas = filtradas.filter(m => m.tipo === filtroAtivo);
    if (termo) filtradas = filtradas.filter(m => (m.produto||'').toLowerCase().includes(termo) || (m.comentario||'').toLowerCase().includes(termo));
    renderMovimentacoes(filtradas);
  }

  document.getElementById('pesquisaProduto').addEventListener('input', aplicarFiltros);

  document.querySelectorAll('.filtro-btn').forEach(btn => {
    btn.addEventListener('click', function(){
      document.querySelectorAll('.filtro-btn').forEach(b => { b.classList.remove('active','btn-primary'); b.classList.add('btn-secondary'); });
      this.classList.remove('btn-secondary');
      this.classList.add('active','btn-primary');
      filtroAtivo = this.dataset.filtro;
      aplicarFiltros();
    });
  });

  async function carregar() {
    if (!token) return;
    try {
      const res = await fetch(`${API}/movimentacoes`, { headers: { "Authorization": `Bearer ${token}` } });
      if (!res.ok) { document.getElementById("erro").innerText = "Erro ao carregar."; return; }
      todasMovimentacoes = await res.json();
      aplicarFiltros();
    } catch(err) {
      document.getElementById("erro").innerText = "Erro de conexão.";
    }
  }

  carregar();
</script>
</body>
</html>
