<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Estoque Fácil</title>
  <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="css/design-system.css"/>
  <link rel="stylesheet" href="css/toast.css"/>
</head>
<body>

<div class="login-bg">
  <div class="login-glow"></div>

  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <img src="assets/logo_transparent.png" alt="Estoque Fácil" class="login-logo-img"/>
    </div>

    <h1 class="login-headline">Bem-vindo de volta</h1>
    <p class="login-sub">Acesse sua conta para continuar</p>

    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input class="form-input" type="email" id="email" placeholder="seu@email.com"/>
    </div>

    <div class="form-group">
      <label class="form-label">Senha</label>
      <div class="input-wrap">
        <input class="form-input" type="password" id="senha" placeholder="••••••••" style="padding-right:40px"/>
        <button class="toggle-senha" type="button" id="toggleSenha" aria-label="Mostrar senha">👁</button>
      </div>
    </div>

    <div style="text-align:right; margin-top:-6px; margin-bottom:22px;">
      <a href="#" style="font-size:12px; color:var(--green); text-decoration:none; font-weight:500;" id="linkEsqueceu">Esqueceu a senha?</a>
    </div>

    <button class="btn btn-primary login-btn" id="btnLogin">Entrar</button>

    <div class="msg-erro" id="msgErro"></div>
    <div class="msg-ok"   id="msgOk"></div>

    <p style="text-align:center; margin-top:28px; font-size:11px; color:var(--text-muted);">
      Controle inteligente de estoque · SaaS
    </p>

  </div>
</div>

<!-- Modal redefinir senha -->
<div class="modal-overlay" id="modalSenha">
  <div class="modal-box" style="max-width:380px">
    <div class="modal-header">
      <span class="modal-title">Redefinir senha</span>
      <button class="btn btn-ghost btn-icon" id="fecharModalSenha">✕</button>
    </div>
    <p style="font-size:13px; color:var(--text-muted); margin-bottom:16px;">Informe seu e-mail para receber o código de redefinição.</p>
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input class="form-input" type="email" id="emailReset" placeholder="seu@email.com"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancelarReset">Cancelar</button>
      <button class="btn btn-primary" id="enviarReset">Enviar código</button>
    </div>
    <div class="msg-erro" id="msgResetErro"></div>
    <div class="msg-ok"   id="msgResetOk"></div>
  </div>
</div>

<script src="js/login.js"></script>
<script>
  document.getElementById('toggleSenha').addEventListener('click', function(){
    const inp = document.getElementById('senha');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('linkEsqueceu').addEventListener('click', function(e){
    e.preventDefault();
    document.getElementById('modalSenha').classList.add('open');
  });

  document.getElementById('fecharModalSenha').addEventListener('click', function(){
    document.getElementById('modalSenha').classList.remove('open');
  });

  document.getElementById('cancelarReset').addEventListener('click', function(){
    document.getElementById('modalSenha').classList.remove('open');
  });
</script>
</body>
</html>
