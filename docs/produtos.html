<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Produtos — Estoque Fácil</title>
  <link rel="stylesheet" href="css/design-system.css"/>
  <link rel="stylesheet" href="css/toast.css"/>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="15" height="8" rx="2" fill="#1677FF"/>
        <rect x="2" y="14" width="15" height="8" rx="2" fill="#1677FF" opacity="0.7"/>
        <rect x="10" y="14" width="15" height="8" rx="2" fill="#00C48C"/>
        <rect x="2" y="26" width="22" height="8" rx="2" fill="#00C48C"/>
      </svg>
      <div class="logo-text">
        <div class="logo-name">
          <span class="white">Estoque</span> <span class="green">Fácil</span>
        </div>
        <div class="logo-tag">SaaS</div>
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Menu</div>
      <a href="dashboard.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Dashboard
      </a>
      <a href="produtos.html" class="nav-link active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        Produtos
      </a>
      <a href="movimentacoes.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        Movimentações
      </a>
      <a href="historico.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Histórico
      </a>
    </div>

    <div class="nav-section" style="margin-top:8px">
      <div class="nav-label">Ferramentas</div>
      <a href="#" class="nav-link" id="navImportarXML">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        Importar XML
      </a>
      <a href="#" class="nav-link" id="navImportarExcel">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><rect x="8" y="13" width="8" height="6" rx="1"/></svg>
        Importar Excel
      </a>
    </div>

    <div class="sidebar-footer">
      <button class="nav-link" id="btnLogout" style="width:100%;border:none;background:none;cursor:pointer;text-align:left;font-family:inherit;font-size:13.5px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <span class="page-title">Produtos</span>
        <span class="breadcrumb">/ Gestão de estoque</span>
      </div>
      <div class="topbar-right">
        <div class="user-avatar" id="avatarUser">?</div>
      </div>
    </header>

    <div class="content">

      <!-- FORMULÁRIO DE CADASTRO -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-header">
          <span class="card-title">Cadastrar produto</span>
        </div>
        <div class="card-body">
          <div class="form-grid">
            <input class="form-input" type="text"   id="inputProduto"  placeholder="Nome do produto"/>
            <input class="form-input" type="number" id="quantidade"     placeholder="Quantidade"/>
            <input class="form-input" type="number" id="valor"          placeholder="Valor (R$)" step="0.01"/>
            <input class="form-input" type="text"   id="fornecedor"     placeholder="Fornecedor"/>
            <input class="form-input" type="text"   id="contato"        placeholder="Contato"/>
          </div>
          <button class="btn btn-primary" id="cadastrar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Cadastrar produto
          </button>
        </div>
      </div>

      <!-- TABELA -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Produtos cadastrados</span>
          <div class="search-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="search-input" type="text" id="pesquisaEstoque" placeholder="Pesquisar produto..."/>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Valor unit.</th>
                <th>Fornecedor</th>
                <th>CNPJ</th>
                <th>Nota fiscal</th>
                <th>Emissão</th>
                <th>Contato</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="lista">
              <tr><td colspan="9">
                <div class="empty-state">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                  <p>Nenhum produto cadastrado</p>
                </div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL MOVIMENTAÇÃO -->
<div id="modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modalTitulo">Movimentação</span>
      <button class="btn btn-ghost btn-icon" id="cancelarModal">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Quantidade</label>
      <input class="form-input" type="number" id="modalQuantidade" placeholder="0"/>
    </div>
    <div class="form-group">
      <label class="form-label">Responsável</label>
      <input class="form-input" type="text" id="modalResponsavel" placeholder="Nome do responsável"/>
    </div>
    <div class="form-group">
      <label class="form-label">Motivo / Observação</label>
      <input class="form-input" type="text" id="modalComentario" placeholder="Ex: Venda, ajuste de inventário..."/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancelarModalBtn">Cancelar</button>
      <button class="btn btn-primary" id="confirmarModal">Confirmar</button>
    </div>
  </div>
</div>

<input type="file" id="inputXML"   accept=".xml"            style="display:none"/>
<input type="file" id="inputExcel" accept=".xlsx,.xls,.ods" style="display:none"/>

<script src="js/toast.js"></script>
<script src="js/script.js"></script>
<script src="js/admin-btn.js"></script>
<script>
  const modalEl = document.getElementById('modal');
  if(modalEl) modalEl.classList.add('hidden');

  document.getElementById('cancelarModalBtn').addEventListener('click', function(){
    document.getElementById('cancelarModal').click();
  });

  document.getElementById('navImportarXML').addEventListener('click', function(e){
    e.preventDefault();
    document.getElementById('inputXML').click();
  });

  document.getElementById('navImportarExcel').addEventListener('click', function(e){
    e.preventDefault();
    document.getElementById('inputExcel').click();
  });

  document.getElementById('btnLogout').addEventListener('click', function(){
    localStorage.clear(); location.href = 'index.html';
  });

  const nome = localStorage.getItem('nome') || JSON.parse(localStorage.getItem('user') || '{}').nome || '?';
  document.getElementById('avatarUser').textContent = nome.charAt(0).toUpperCase();
</script>
<style>
  #modal { display:none; }
  #modal:not(.hidden) { display:flex; }
</style>
</body>
</html>
