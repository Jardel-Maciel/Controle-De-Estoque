<!doctype html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Movimentações</title>
<link rel="stylesheet" href="dashboard.css">
</head>

<body>

<h1>Movimentações</h1>

<div id="lista"></div>

<script>
const API = "https://backend-estoque-fnfc.onrender.com";
const token = localStorage.getItem("token");

async function carregar() {
  try {
    const res = await fetch(`${API}/movimentacoes`, {
      headers: { Authorization: token }
    });

    if (!res.ok) {
      const erro = await res.text();
      console.error("Erro:", erro);
      return;
    }

    const data = await res.json();

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

   data.forEach(m => {
  lista.innerHTML += `
    <div class="card">
      <h3>${m.produto}</h3>

      <span class="tipo ${m.tipo}">
        ${m.tipo === "entrada" ? "ENTRADA" : "SAÍDA"}
      </span>

      <p>Quantidade: ${m.quantidade}</p>

      <p class="comentario">
        ${m.comentario || "Sem observação"}
      </p>

      <p class="responsavel">
        👤 ${m.responsavel || "Não informado"}
      </p>

      <p class="data">
        ${new Date(m.data).toLocaleString()}
      </p>
    </div>
  `;
});

  } catch (err) {
    console.error(err);
  }
}

carregar();
</script>

</body>
</html>
