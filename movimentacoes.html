<!doctype html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Movimentações</title>
<link rel="stylesheet" href="dashboard.css">
</head>

<body>

<h1>Movimentações</h1>

<div id="erro" style="color:red; margin:10px 0;"></div>
<div id="lista"></div>

<script>
const API = "https://backend-estoque-fnfc.onrender.com";
const token = localStorage.getItem("token");

if (!token) {
  document.getElementById("erro").innerText = "Usuário não autenticado. Faça login novamente.";
}

async function carregar() {
  const lista = document.getElementById("lista");
  const erroDiv = document.getElementById("erro");

  try {
    const res = await fetch(`${API}/movimentacoes`, {
      method: "GET",
      headers: {
        "Authorization": token,
        "Content-Type": "application/json"
      }
    });

    if (!res.ok) {
      const text = await res.text();
      erroDiv.innerText = "Erro ao carregar movimentações: " + text;
      return;
    }

    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      lista.innerHTML = "<p>Nenhuma movimentação encontrada.</p>";
      return;
    }

    lista.innerHTML = "";

    data.forEach(m => {
      const dataFormatada = m.data
        ? new Date(m.data).toLocaleString("pt-BR")
        : "Data não disponível";

      lista.innerHTML += `
        <div class="card">
          <h3>${m.produto}</h3>

          <span class="tipo ${m.tipo}">
            ${m.tipo === "entrada" ? "ENTRADA" : "SAÍDA"}
          </span>

          <p><b>Quantidade:</b> ${m.quantidade}</p>

          <p class="comentario">
            ${m.comentario ? m.comentario : "Sem observação"}
          </p>

          <p class="responsavel">
            👤 ${m.responsavel ? m.responsavel : "Não informado"}
          </p>

          <p class="data">
            🕒 ${dataFormatada}
          </p>
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
    erroDiv.innerText = "Erro de conexão com o servidor.";
  }
}

carregar();
</script>

</body>
</html>
